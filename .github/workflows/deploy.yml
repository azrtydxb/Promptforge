name: Build & Push image to ECR

# Builds the Promptforge Docker image and pushes it to Amazon ECR using GitHub OIDC
# (no static AWS keys). Image is consumed by the promptforge ECS Fargate service.
# Deployment (ECS rollout) is driven from promptforge-infra (OpenTofu) for now.

on:
  push:
    branches:
      - main
      - worktree-structured-pro-redesign
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: promptforge
  ROLE_ARN: arn:aws:iam::296186243350:role/promptforge-gha-ecr-push

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "Pushed ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "and :latest" >> "$GITHUB_STEP_SUMMARY"
