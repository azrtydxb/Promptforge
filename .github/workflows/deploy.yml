name: deploy
on:
  push:
    branches: [main]
permissions:
  id-token: write
  contents: read
env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: promptforge
  ECS_CLUSTER: promptforge
  ECS_SERVICE: promptforge-web
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::296186243350:role/promptforge-gha-ecr-push
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Build and push
        run: |
          IMAGE=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
      - name: Deploy ECS service
        run: |
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} --force-new-deployment
          aws ecs wait services-stable --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }}
