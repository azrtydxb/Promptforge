apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: promptforge-ingress
  namespace: promptforge
  annotations:
    # Cert-manager for SSL
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # Nginx ingress annotations
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # Proxy settings for Next.js
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "8k"

    # WebSocket support (if needed)
    nginx.ingress.kubernetes.io/websocket-services: "promptforge-service"

    # Rate limiting (optional)
    nginx.ingress.kubernetes.io/limit-rps: "100"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - promptforge.directory
    - www.promptforge.directory
    secretName: promptforge-tls
  rules:
  - host: promptforge.directory
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: promptforge-service
            port:
              number: 80
  - host: www.promptforge.directory
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: promptforge-service
            port:
              number: 80
