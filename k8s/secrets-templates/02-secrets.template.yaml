---
# Secret template for Promptforge application
# IMPORTANT: This is a TEMPLATE file. Do NOT apply directly!
#
# Steps to create the actual secret:
# 1. Copy this file: cp 02-secrets.template.yaml 02-secrets.yaml
# 2. Replace all <PLACEHOLDER> values with actual secrets
# 3. Encode values in base64: echo -n "your-secret-value" | base64
# 4. Add 02-secrets.yaml to .gitignore (NEVER commit secrets!)
# 5. Apply: kubectl apply -f 02-secrets.yaml
#
# Required Environment Variables:
# - DATABASE_URL: PostgreSQL connection string (Supabase or other)
#   Format: postgresql://user:password@host:port/database?schema=public&connection_limit=10&pool_timeout=20&connect_timeout=10
#   Connection pooling parameters:
#   - connection_limit: Max connections per pod (recommended: 10 for production)
#   - pool_timeout: Seconds to wait for available connection (recommended: 20)
#   - connect_timeout: Seconds to wait when establishing connection (recommended: 10)
#
# - NEXT_PUBLIC_SUPABASE_URL: Supabase project URL
#   Format: https://your-project.supabase.co
#
# - NEXT_PUBLIC_SUPABASE_ANON_KEY: Supabase anonymous/public key
#   Found in: Supabase Dashboard > Settings > API
#
# - SUPABASE_SERVICE_ROLE_KEY: Supabase service role key (private!)
#   Found in: Supabase Dashboard > Settings > API
#
# - NEXTAUTH_SECRET: Random string for NextAuth.js session encryption
#   Generate: openssl rand -base64 32
#
# - NEXTAUTH_URL: Full URL of your application
#   Format: https://promptforge.directory

apiVersion: v1
kind: Secret
metadata:
  name: promptforge-secrets
  namespace: promptforge
  labels:
    app: promptforge
type: Opaque
data:
  # Base64 encoded values
  # Example encoding: echo -n "postgresql://user:pass@host:5432/db" | base64

  DATABASE_URL: <BASE64_ENCODED_DATABASE_URL>
  NEXT_PUBLIC_SUPABASE_URL: <BASE64_ENCODED_SUPABASE_URL>
  NEXT_PUBLIC_SUPABASE_ANON_KEY: <BASE64_ENCODED_SUPABASE_ANON_KEY>
  SUPABASE_SERVICE_ROLE_KEY: <BASE64_ENCODED_SUPABASE_SERVICE_ROLE_KEY>
  NEXTAUTH_SECRET: <BASE64_ENCODED_NEXTAUTH_SECRET>
  NEXTAUTH_URL: <BASE64_ENCODED_NEXTAUTH_URL>
