---
# ClusterIssuer for Let's Encrypt ACME certificate provisioning
# Prerequisites: cert-manager must be installed in the cluster
# Install cert-manager: kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.14.0/cert-manager.yaml
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Let's Encrypt production server
    server: https://acme-v02.api.letsencrypt.org/directory

    # Email for certificate expiration notifications
    # IMPORTANT: Replace with your actual email address
    email: admin@promptforge.directory

    # Secret to store the ACME account private key
    privateKeySecretRef:
      name: letsencrypt-prod-account-key

    # HTTP-01 challenge solver using nginx ingress
    solvers:
    - http01:
        ingress:
          class: nginx
