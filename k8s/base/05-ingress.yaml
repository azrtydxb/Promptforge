---
# Ingress for Promptforge application
# Manages external access with SSL/TLS termination
# Prerequisites:
# 1. NGINX Ingress Controller installed
#    kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/cloud/deploy.yaml
# 2. cert-manager installed (for automatic SSL certificates)
# 3. ClusterIssuer created (see 01-clusterissuer.yaml)

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: promptforge-ingress
  namespace: promptforge
  labels:
    app: promptforge
  annotations:
    # Ingress class
    kubernetes.io/ingress.class: nginx

    # cert-manager annotations for automatic SSL certificate provisioning
    cert-manager.io/cluster-issuer: letsencrypt-prod

    # NGINX-specific annotations
    nginx.ingress.kubernetes.io/ssl-redirect: "true"           # Force HTTPS
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"     # Enforce SSL redirect

    # Rate limiting (optional but recommended for production)
    nginx.ingress.kubernetes.io/limit-rps: "100"               # 100 requests per second per IP

    # Body size limit for uploads
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"         # 10MB max upload

    # Timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"

    # Enable HTTP/2
    nginx.ingress.kubernetes.io/use-http2: "true"

    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";

spec:
  # TLS configuration
  tls:
  - hosts:
    - promptforge.directory
    - www.promptforge.directory
    # Secret where cert-manager will store the certificate
    secretName: promptforge-tls-cert

  # Routing rules
  rules:
  # Primary domain: promptforge.directory
  - host: promptforge.directory
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: promptforge-service
            port:
              number: 80

  # WWW subdomain: www.promptforge.directory
  - host: www.promptforge.directory
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: promptforge-service
            port:
              number: 80
