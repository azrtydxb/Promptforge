---
# Service for Promptforge application
# Provides stable internal networking for pods
apiVersion: v1
kind: Service
metadata:
  name: promptforge-service
  namespace: promptforge
  labels:
    app: promptforge
spec:
  # ClusterIP type: only accessible within the cluster
  # Ingress will route external traffic to this service
  type: ClusterIP

  # Session affinity for sticky sessions (optional)
  # Uncomment if you need session persistence
  # sessionAffinity: ClientIP

  selector:
    app: promptforge

  ports:
  - name: http
    port: 80         # Service port
    targetPort: 3000 # Container port
    protocol: TCP
