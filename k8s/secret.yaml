apiVersion: v1
kind: Secret
metadata:
  name: promptforge-secrets
  namespace: promptforge
type: Opaque
stringData:
  # Database
  DATABASE_URL: "postgresql://USER:PASSWORD@HOST:5432/promptforge?schema=public"

  # NextAuth
  NEXTAUTH_SECRET: "CHANGE_ME_GENERATED_SECRET"
  NEXTAUTH_URL: "https://promptforge.directory"

  # Redis
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ""

  # OpenAI (optional)
  OPENAI_API_KEY: ""
