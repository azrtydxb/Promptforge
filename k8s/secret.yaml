apiVersion: v1
kind: Secret
metadata:
  name: promptforge-secrets
  namespace: promptforge
type: Opaque
stringData:
  # Database (with connection pooling parameters)
  # connection_limit=10: Max 10 connections per pod instance
  # pool_timeout=20: Wait up to 20 seconds for available connection
  # connect_timeout=10: Wait up to 10 seconds when establishing connection
  DATABASE_URL: "postgresql://USER:PASSWORD@HOST:5432/promptforge?schema=public&connection_limit=10&pool_timeout=20&connect_timeout=10"

  # NextAuth
  NEXTAUTH_SECRET: "CHANGE_ME_GENERATED_SECRET"
  NEXTAUTH_URL: "https://promptforge.directory"

  # Redis
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ""

  # OpenAI (optional)
  OPENAI_API_KEY: ""
