apiVersion: apps/v1
kind: Deployment
metadata:
  name: promptforge
  namespace: promptforge
  labels:
    app: promptforge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: promptforge
  template:
    metadata:
      labels:
        app: promptforge
    spec:
      containers:
      - name: promptforge
        image: promptforge:latest # Replace with your actual image
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: promptforge-config
              key: NODE_ENV
        - name: NEXT_PUBLIC_APP_URL
          valueFrom:
            configMapKeyRef:
              name: promptforge-config
              key: NEXT_PUBLIC_APP_URL
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: promptforge-secrets
              key: DATABASE_URL
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: promptforge-secrets
              key: NEXTAUTH_SECRET
        - name: NEXTAUTH_URL
          valueFrom:
            secretKeyRef:
              name: promptforge-secrets
              key: NEXTAUTH_URL
        - name: REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: promptforge-secrets
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            secretKeyRef:
              name: promptforge-secrets
              key: REDIS_PORT
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: promptforge-secrets
              key: REDIS_PASSWORD
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: promptforge-secrets
              key: OPENAI_API_KEY
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
